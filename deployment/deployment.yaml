apiVersion: apps/v1
kind: Deployment

metadata:
  name: wine-api
  namespace: ai-mlops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: wine-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:

    metadata:
      labels:
        app: wine-api

    spec:

      containers:

      - name: wine-api

        image: ghcr.io/naveenatnew/azure-ai-mlops-demo:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        resources:
          requests:
            cpu: 100m
            memory: 256Mi

          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10